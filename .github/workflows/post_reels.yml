name: Auto YouTube Shorts Bot

on:
  schedule:
    - cron: '0 9 * * *'  # daily at 9 AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Repo
        uses: actions/checkout@v3

      # 2. Setup Python 3.11
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Install FFmpeg
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 4. Upgrade pip and install MoviePy and dependencies
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install moviepy==1.0.3 requests

      # 5. Verify MoviePy installation
      - name: Verify MoviePy
        run: python -c "from moviepy.editor import VideoFileClip, TextClip; print('✅ MoviePy works!')"

      # 6. Run YouTube bot
      - name: Run YouTube Shorts Bot
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python youtube_bot.py
