name: Auto YouTube Shorts

on:
  schedule:
    - cron: '0 9 * * *'  # daily at 9AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install FFmpeg and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install moviepy==1.0.3 imageio imageio-ffmpeg google-api-python-client google-auth google-auth-oauthlib requests TTS openai

      - name: Run YouTube Bot
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TOKEN_JSON_B64: ${{ secrets.TOKEN_JSON_B64 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python youtube_bot.py
