name: Auto YouTube Shorts Bot

on:
  schedule:
    - cron: '0 9 * * *'  # daily at 9AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your repository
      - name: Checkout Repo
        uses: actions/checkout@v3

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Install FFmpeg (required by MoviePy)
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 4. Install Python dependencies
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            moviepy==1.0.3 \
            imageio \
            imageio-ffmpeg \
            google-api-python-client \
            google-auth \
            google-auth-oauthlib \
            requests \
            TTS

      # 5. Verify MoviePy installation
      - name: Verify MoviePy
        run: python -c "from moviepy.editor import VideoFileClip, AudioFileClip; print('✅ MoviePy works!')"

      # 6. Run your YouTube bot
      - name: Run YouTube Bot
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python youtube_bot.py
