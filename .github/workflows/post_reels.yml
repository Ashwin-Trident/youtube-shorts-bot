name: YouTube Shorts Bot

on:
  workflow_dispatch:   # Allows manual trigger
  schedule:
    - cron: '0 8 * * *'  # Runs every day at 8 AM UTC

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    env:
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests gTTS google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client pillow moviepy==2.2.1

      - name: Run YouTube Bot
        run: python youtube_bot.py
