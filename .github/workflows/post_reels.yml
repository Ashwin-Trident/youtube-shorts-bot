name: Auto YouTube Shorts Bot

on:
  schedule:
    - cron: '0 9 * * *'  # daily at 9AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install moviepy==2.0.0 imageio imageio-ffmpeg google-api-python-client google-auth google-auth-oauthlib requests TTS

      - name: Verify packages
        run: |
          python -c "from moviepy.editor import VideoFileClip, AudioFileClip; print('MoviePy works!')"
          python -c "import TTS; print('TTS works!')"

      - name: Run YouTube Bot
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python youtube_bot.py
