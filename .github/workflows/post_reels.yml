name: Auto YouTube Shorts Bot

on:
  schedule:
    - cron: '0 9 * * *'   # Runs daily at 9 AM UTC
  workflow_dispatch:      # Manual trigger option

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install system dependencies (FFmpeg + Fonts)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-dejavu-core

      # 4️⃣ Install Python packages
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            moviepy==1.0.3 Pillow requests imageio imageio-ffmpeg \
            google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      # 5️⃣ Verify setup
      - name: Verify Environment
        run: |
          ffmpeg -version
          python -c "from moviepy.editor import VideoFileClip; print('MoviePy OK')"

      # 6️⃣ Run YouTube Shorts Bot
      - name: Run YouTube Shorts Bot
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python youtube_bot.py
