name: Auto YouTube Shorts Bot

on:
  schedule:
    - cron: '0 9 * * *'  # runs daily at 9 AM UTC
  workflow_dispatch:       # allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repo
        uses: actions/checkout@v3

      # 2️⃣ Setup Python 3.11
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Install FFmpeg (required by MoviePy)
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 4️⃣ Install Python dependencies
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            moviepy==1.0.3 \
            Pillow \
            requests \
            gTTS \
            google-api-python-client \
            google-auth \
            google-auth-oauthlib

      # 5️⃣ Verify packages
      - name: Verify Python Packages
        run: python -c "from moviepy.editor import VideoFileClip; from PIL import Image; from gtts import gTTS; print('✅ Packages OK!')"

      # 6️⃣ Run YouTube bot
      - name: Run YouTube Shorts Bot
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python youtube_bot.py
