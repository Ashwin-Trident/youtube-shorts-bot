name: Auto YouTube Shorts Bot

on:
  schedule:
    - cron: '0 9 * * *'   # Runs daily at 9 AM UTC
  workflow_dispatch:      # Manual run option

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install system dependencies (VERY IMPORTANT)
      - name: Install FFmpeg & Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-dejavu-core

      # 4️⃣ Install Python dependencies
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install moviepy==1.0.3 Pillow requests imageio imageio-ffmpeg

      # 5️⃣ Verify environment (helps debugging)
      - name: Verify Setup
        run: |
          ffmpeg -version
          python -c "from moviepy.editor import VideoFileClip; print('MoviePy OK')"

      # 6️⃣ Run YouTube Bot
      - name: Run YouTube Shorts Bot
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python youtube_bot.py
