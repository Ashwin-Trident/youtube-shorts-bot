name: Auto YouTube Shorts Bot

on:
  schedule:
    - cron: '0 9 * * *'  # runs daily at 9 AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout Repo
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Install FFmpeg (required by MoviePy)
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # 4. Install Python dependencies
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install moviepy google-api-python-client google-auth google-auth-oauthlib requests

      # 5. Run YouTube bot
      - name: Run YouTube Shorts Bot
        env:
          TOKEN_JSON_B64: ${{ secrets.TOKEN_JSON_B64 }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python youtube_bot.py
